<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weapon Forge 3D</title>
    <link rel="stylesheet" href="weaponforge.css">
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <header class="app-toolbar">
        <div class="toolbar-brand">⚔️ WEAPON FORGE 3D</div>
        <div class="toolbar-divider">|</div>
        <div class="toolbar-link" id="btn-toggle-ui">CLOSE FORGE</div>
        <div class="toolbar-divider">|</div>
        <div class="toolbar-link" id="btn-randomize" style="color: #58a6ff;">RANDOMIZE</div>
        <div class="toolbar-divider">|</div>
        <div class="toolbar-link">SAVE WEAPON</div>
        <div class="toolbar-divider">|</div>
        <a href="../index.html" class="toolbar-link" style="text-decoration: none;">QUIT TO HUB</a>
    </header>

    <div id="forge-canvas">
        <div id="canvas-container"></div>
    </div>

    <div id="ui-wrapper" class="open">
        <div id="ui-panel">
            <h2>SMITHING CONTROLS</h2>
            
            <div class="control-section" style="border-color: #8ab4f8; background: #111a22;">
                <h3 style="color: #ffffff;">GLOBAL EDGE WEAR</h3>
                <div class="slider-group" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
                    <label style="margin-bottom: 0; flex: 1;">Wear Color <span id="val-global-edge-color" style="margin-left: 10px;">#000000</span></label>
                    <input type="color" id="inp-global-edge-color" value="#000000" style="width: 40px; height: 30px; cursor: pointer; background: none; border: 1px solid #30363d; border-radius: 4px; padding: 0;">
                </div>
                <div class="slider-group" style="margin-bottom: 15px;">
                    <label>Wear Strength <span id="val-global-edge-str">1.00</span></label>
                    <input type="range" id="inp-global-edge-str" min="0.0" max="2.0" step="0.01" value="1.00">
                </div>
                <div class="slider-group" style="margin-bottom: 15px;">
                    <label>Grunge Breakup <span id="val-global-edge-grunge">0.30</span></label>
                    <input type="range" id="inp-global-edge-grunge" min="0.0" max="1.0" step="0.01" value="0.30">
                </div>
                <div class="slider-group" style="margin-bottom: 15px;">
                    <label>Grunge Pattern</label>
                    <select id="inp-global-edge-tex" style="width: 100%; background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 4px; font-family: 'Segoe UI', sans-serif;">
                        <option value="1" selected>Grunge 1</option>
                        <option value="2">Grunge 2</option>
                    </select>
                </div>
                <div class="slider-group" style="margin-bottom: 0;">
                    <label>Grunge Scale <span id="val-global-edge-scale">4.0</span></label>
                    <input type="range" id="inp-global-edge-scale" min="0.1" max="15.0" step="0.1" value="4.0">
                </div>
            </div>
            
            <div class="control-section">
                <h3>BLADE</h3>
                <div class="slider-group">
                    <label>Width <span id="val-blade-w">50</span></label>
                    <input type="range" id="inp-blade-w" min="20" max="120" value="50">
                </div>
                <div class="slider-group">
                    <label>Length <span id="val-blade-h">380</span></label>
                    <input type="range" id="inp-blade-h" min="150" max="600" value="380">
                </div>
                <div class="slider-group">
                    <label>Texture Scale <span id="val-blade-tex">7.5</span></label>
                    <input type="range" id="inp-blade-tex" min="0.5" max="10" step="0.1" value="7.5">
                </div>
                <div class="slider-group">
                    <label>Bump Strength <span id="val-blade-bump">0.2</span></label>
                    <input type="range" id="inp-blade-bump" min="0.0" max="5.0" step="0.1" value="0.2">
                </div>
                <div class="slider-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="margin-bottom: 0;">Rotate Texture 90°</label>
                    <input type="checkbox" id="inp-blade-rot" checked style="width: 18px; height: 18px; cursor: pointer; accent-color: #8ab4f8;">
                </div>
                <div class="style-row">
                    <div class="texture-group">
                        <label>Shape</label>
                        <div class="preview-btn btn-shape" data-category="blades" data-part="blade" data-active="blade1">
                            <span class="tex-name" id="name-shape-blade">Standard</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>GUARD</h3>
                <div class="slider-group">
                    <label>Width <span id="val-guard-w">140</span></label>
                    <input type="range" id="inp-guard-w" min="60" max="300" value="140">
                </div>
                <div class="slider-group">
                    <label>Height (Vertical) <span id="val-guard-h">35</span></label>
                    <input type="range" id="inp-guard-h" min="10" max="100" value="35">
                </div>
                <div class="slider-group">
                    <label>Texture Scale <span id="val-guard-tex">2.0</span></label>
                    <input type="range" id="inp-guard-tex" min="0.5" max="10" step="0.1" value="2.0">
                </div>
                <div class="slider-group">
                    <label>Bump Strength <span id="val-guard-bump">1.5</span></label>
                    <input type="range" id="inp-guard-bump" min="0.0" max="5.0" step="0.1" value="1.5">
                </div>
                <div class="slider-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="margin-bottom: 0;">Rotate Texture 90°</label>
                    <input type="checkbox" id="inp-guard-rot" style="width: 18px; height: 18px; cursor: pointer; accent-color: #8ab4f8;">
                </div>
                <div class="style-row">
                    <div class="texture-group">
                        <label>Shape</label>
                        <div class="preview-btn btn-shape" data-category="guards" data-part="guard" data-active="guard1">
                            <span class="tex-name" id="name-shape-guard">Standard</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>GRIP</h3>
                <div class="slider-group">
                    <label>Width <span id="val-grip-w">30</span></label>
                    <input type="range" id="inp-grip-w" min="15" max="80" value="30">
                </div>
                <div class="slider-group">
                    <label>Length (Vertical) <span id="val-grip-h">100</span></label>
                    <input type="range" id="inp-grip-h" min="40" max="250" value="100">
                </div>
                <div class="slider-group">
                    <label>Texture Scale <span id="val-grip-tex">1.5</span></label>
                    <input type="range" id="inp-grip-tex" min="0.5" max="10" step="0.1" value="1.5">
                </div>
                <div class="slider-group">
                    <label>Bump Strength <span id="val-grip-bump">2.0</span></label>
                    <input type="range" id="inp-grip-bump" min="0.0" max="5.0" step="0.1" value="2.0">
                </div>
                <div class="slider-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="margin-bottom: 0;">Rotate Texture 90°</label>
                    <input type="checkbox" id="inp-grip-rot" style="width: 18px; height: 18px; cursor: pointer; accent-color: #8ab4f8;">
                </div>
                <div class="style-row">
                    <div class="texture-group">
                        <label>Shape</label>
                        <div class="preview-btn btn-shape" data-category="grips" data-part="grip" data-active="grip1">
                            <span class="tex-name" id="name-shape-grip">Standard</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>POMMEL</h3>
                <div class="slider-group">
                    <label>Size <span id="val-pommel-size">54</span></label>
                    <input type="range" id="inp-pommel-size" min="20" max="120" value="54">
                </div>
                <div class="slider-group">
                    <label>Texture Scale <span id="val-pommel-tex">3.0</span></label>
                    <input type="range" id="inp-pommel-tex" min="0.5" max="10" step="0.1" value="3.0">
                </div>
                <div class="slider-group">
                    <label>Bump Strength <span id="val-pommel-bump">1.0</span></label>
                    <input type="range" id="inp-pommel-bump" min="0.0" max="5.0" step="0.1" value="1.0">
                </div>
                <div class="slider-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="margin-bottom: 0;">Rotate Texture 90°</label>
                    <input type="checkbox" id="inp-pommel-rot" style="width: 18px; height: 18px; cursor: pointer; accent-color: #8ab4f8;">
                </div>
                <div class="style-row">
                    <div class="texture-group">
                        <label>Shape</label>
                        <div class="preview-btn btn-shape" data-category="pommels" data-part="pommel" data-active="pommel2">
                            <span class="tex-name" id="name-shape-pommel">Heavy</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="tex-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">SELECT OPTION</h3>
                <button id="btn-close-modal">✕</button>
            </div>
            <div class="tex-grid" id="modal-tex-grid">
                </div>
        </div>
    </div>
    <div id="swatch-popover" class="swatch-popover"></div>
    
    <script type="module" src="weaponforge.js"></script>
</body>
</html>
